name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_VERSION: "0.5.11"

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Ruff lint
        run: uv run ruff check .
      - name: Black format check
        run: uv run black --check .
      - name: Mypy type-check
        run: uv run mypy shared/ collectors/ pipeline/ agent/ agent_runtime/ output/ lambda_handlers/ infrastructure/ main.py __main__.py research_cli.py

  test:
    name: Tests & coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run tests with coverage
        run: >
          uv run python -m pytest tests/
          --cov=collectors --cov=pipeline --cov=shared --cov=main --cov=research_cli
          --cov=lambda_handlers --cov=output --cov=agent --cov=agent_runtime
          --cov-report=term-missing --cov-report=xml
          --cov-fail-under=55
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  synth:
    name: CDK synth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Synthesize CDK (offline, dummy account)
        run: uv run python scripts/ci_synth.py

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build digest image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          provenance: false
          push: false
          tags: omnisummary-digest:ci
      # Build the agentcore image so a missing COPY or unresolved dep in the deep-research
      # runtime is caught in CI rather than at AgentCore cold-start. The runtime's import graph
      # (agent_runtime.app -> output.delivery -> shared.research/media) is separately exercised
      # by tests/test_agentcore_app.py on the host.
      - name: Build agentcore image (deep-research runtime)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.agentcore
          platforms: linux/arm64
          provenance: false
          push: false
          tags: omnisummary-agentcore:ci
